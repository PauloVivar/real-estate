version: '3.9'

services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: vivarq
      POSTGRES_PASSWORD: vivarq_dev
      POSTGRES_DB: vivarq_home
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://vivarq:vivarq_dev@postgres:5432/vivarq_home
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      UPLOADPOST_API_KEY: ${UPLOADPOST_API_KEY}
      UPLOADPOST_USER: ${UPLOADPOST_USER:-vivarq}
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - uploaded_photos:/app/uploads

  video:
    build: ./video
    ports:
      - '3001:3001'
    volumes:
      - ./video:/app
      - /app/node_modules
      - uploaded_photos:/app/uploads
      - video_output:/app/output
      - ./video/public/music:/app/public/music

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
  uploaded_photos:
  video_output:
